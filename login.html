<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; background:#f3f4f6; }
    form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    .erreur { color: red; margin-bottom: 10px; }
  </style>
</head>
<body>
  <form id="loginForm">
    <h2>Espace employés</h2>
    <div class="erreur" id="error"></div>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
  </form>

  <script>
    // ⚠️ REMPLACEZ CES DEUX VALEURS par celles de votre projet Supabase (Project Settings > API)
    const SUPABASE_URL = 'https://xmlvatdshsptyzvzeqro.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbHZhdGRzaHNwdHl6dnplcXJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDgyODksImV4cCI6MjA5Mjk4NDI4OX0.WYudi_k968UZ_BQTfX9_DEz26EsxvbuPEd_xeX3hpjE'

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        document.getElementById('error').textContent = "Erreur : " + error.message
      } else {
        // Rediriger vers la page de gestion
        window.location.href = '/gestion.html'
      }
    })
  </script>
</body>
</html>
