<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Poste de travail Employés</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">Gestionnaire de Publication DoodStream</h1>

        <div class="bg-gray-800 p-6 rounded-xl mb-8 border border-blue-500/30">
            <h2 class="font-bold mb-4 uppercase text-sm tracking-widest text-blue-300">Poster une nouvelle vidéo</h2>
            <div id="upload-zone">
                <button onclick="startUploadProcess()" class="bg-blue-600 px-6 py-2 rounded font-bold hover:bg-blue-500">
                    <i class="fas fa-cloud-upload-alt"></i> Préparer l'envoi
                </button>
            </div>
            <div id="real-upload-form" class="hidden mt-4 p-4 bg-gray-900 rounded">
                <form id="dood-form" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="api_key" value="TA_CLE_API_CACHE_PAR_JS">
                    <input type="file" name="file" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-500">
                    <button type="submit" class="mt-4 bg-green-600 px-4 py-2 rounded">Démarrer le transfert</button>
                </form>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">Contenu du compte</h2>
                <button onclick="loadExplorer(0)" class="text-xs bg-gray-700 px-2 py-1 rounded">Actualiser</button>
            </div>
            <div id="file-list" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        // FONCTION POUR POSTER (L'UPLOAD)
        async function startUploadProcess() {
            const res = await fetch('/api/prepare-upload');
            const data = await res.json();
            const serverUrl = data.résultat; // L'URL dynamique de DoodStream
            
            // On configure le formulaire pour qu'il envoie DIRECTEMENT à DoodStream
            const form = document.getElementById('dood-form');
            form.action = serverUrl; 
            
            document.getElementById('upload-zone').classList.add('hidden');
            document.getElementById('real-upload-form').classList.remove('hidden');
            alert("Serveur prêt. Vous pouvez sélectionner et poster la vidéo.");
        }

        // FONCTION POUR GÉRER (LISTE, RENOMMER, DÉPLACER)
        async function loadExplorer(fldId = 0) {
            const res = await fetch(`/api/explorer?fld_id=${fldId}`);
            const data = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = "";

            // Affichage dossiers
            data.résultat.dossiers.forEach(d => {
                list.innerHTML += `
                    <div class="flex justify-between bg-gray-700 p-3 rounded">
                        <span><i class="fas fa-folder text-yellow-500"></i> ${d.nom}</span>
                        <button onclick="loadExplorer(${d.fld_id})" class="text-blue-400 text-sm">Ouvrir</button>
                    </div>`;
            });

            // Affichage fichiers avec options de gestion
            data.résultat.fichiers.forEach(f => {
                list.innerHTML += `
                    <div class="bg-gray-900 p-3 rounded border-l-4 border-blue-500 flex flex-col gap-2">
                        <div class="flex justify-between">
                            <span class="text-sm font-medium">${f.titre}</span>
                            <span class="text-xs text-gray-500">${f.vues} vues</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyLink('${f.file_code}')" class="text-[10px] bg-blue-900 px-2 py-1 rounded">Copier Embed</button>
                            <button onclick="renameFile('${f.file_code}')" class="text-[10px] bg-gray-700 px-2 py-1 rounded">Renommer</button>
                            <button onclick="deleteFile('${f.file_code}')" class="text-[10px] bg-red-900 px-2 py-1 rounded text-red-200">Supprimer</button>
                        </div>
                    </div>`;
            });
        }

        function copyLink(code) {
            const link = `https://dood.to/e/${code}`;
            navigator.clipboard.writeText(link);
            alert("Lien Embed copié !");
        }

        loadExplorer();
    </script>
</body>
</html>
